  <script>
    const routes = {
      bedroom:    'chambre.html',
      kitchen:    'cuisine.html',
      showerroom: 'salle-eau.html',
      livingroom: 'salon.html'
    };
    document.querySelectorAll('.room[role="button"]').forEach(function(el) {
      const key = Object.keys(routes).find(k => el.classList.contains(k));
      if (!key) return;
      el.style.cursor = 'pointer';
      el.addEventListener('click', function() {
        window.location.href = routes[key];
      });
      el.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') window.location.href = routes[key];
      });
    });
  </script>
